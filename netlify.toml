# Netlify Configuration for Nuxt 4 Static Site

[build]
  command = "pnpm run generate"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  NPM_FLAGS = "--prefix=/dev/null"

# Disable Netlify's automatic Nuxt detection
[build.processing]
  skip_processing = true

[context.production.environment]
  NUXT_CAN_PERSIST = "false"
  NUXT_MULTIPLE_PAYMENT_METHODS = "true"

[context.deploy-preview.environment]
  NUXT_CAN_PERSIST = "false"
  NUXT_MULTIPLE_PAYMENT_METHODS = "true"
